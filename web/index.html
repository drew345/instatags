<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>instatags</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="page">
    <header class="app-header">
      <p class="eyebrow">instatags</p>
    </header>

    <section class="primary-action">
      <button id="nextBtn" class="primary generate-btn">Generate Next 5</button>
    </section>

    <section class="panel output-panel">
      <div class="output-actions">
        <p id="outputStatus" class="muted">No hashtags generated yet.</p>
        <button id="copyBtn" class="copy-btn" disabled>Copy</button>
      </div>
      <div id="currentTags" class="current-tags"></div>
      <div id="currentDetails" class="detail-grid compact-details"></div>
    </section>

    <section class="panel controls">
      <div class="field-group">
        <label class="field">
          <span>Focus Category</span>
          <select id="categories">
            <option value="">No focus</option>
            <option value="acting">Acting</option>
            <option value="chinese">Chinese</option>
            <option value="commercial">Commercial</option>
            <option value="drama">Drama</option>
            <option value="lookbook">Lookbook</option>
            <option value="senior">Senior</option>
            <option value="shortform">Shortform</option>
          </select>
        </label>
        <label class="field">
          <span>Forced Tag</span>
          <input id="forcedTag" type="text" placeholder="optional">
        </label>
      </div>
    </section>

    <section class="panel secondary-actions">
      <div class="button-row">
        <button id="previewBtn">Preview 6 Iterations</button>
        <button id="resetBtn">Reset Queue</button>
      </div>
      <div id="results" class="results"></div>
    </section>

    <section class="panel">
      <div class="section-header">
        <h2>Current Queue Status</h2>
        <p id="statusLine">Loading...</p>
      </div>
      <div id="queueHead" class="queue-list"></div>
    </section>

    <footer class="page-footer">
      <h1>Hashtag rotation for <span>raw345ig</span></h1>
      <p>Generate the next 5 hashtags from the ranked queue, with optional category focus or one forced custom tag.</p>
    </footer>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
